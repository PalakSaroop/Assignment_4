<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Secure Task Manager</title>
</head>

<body>

<h1>Secure Task Manager</h1>

<p>
    Logged in as:
    <span th:text="${#authentication.name}">username</span>
</p>

<hr>

<h2>Create / Edit Task</h2>

<form th:action="@{/tasks}" th:object="${taskForm}" method="post">

    <!-- TODO G: Hidden ID field -->
    <input type="hidden" th:field="*{id}" />

    <label>Title:
        <input type="text" th:field="*{title}" required />
    </label>

    <br><br>

    <label>Description:
        <textarea th:field="*{description}" rows="3" cols="40" required></textarea>
    </label>

    <br><br>

    <label>
        Completed:
        <input type="checkbox" th:field="*{completed}" />
    </label>

    <br><br>

    <button type="submit">Save Task</button>

</form>

<hr>

<h2>Existing Tasks</h2>

<table border="1" cellpadding="6">

<thead>
<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Description</th>
    <th>Completed</th>
    <th>Actions</th>
</tr>
</thead>

<tbody>

<tr th:each="t : ${tasks}">

    <td th:text="${t.id}"></td>
    <td th:text="${t.title}"></td>
    <td th:text="${t.description}"></td>
    <td th:text="${t.completed}"></td>

    <td>

        <!-- TODO H: Edit link -->
        <a th:href="@{/tasks/{id}/edit(id=${t.id})}">Edit</a>

        <!-- TODO I: Delete form -->
        <form th:action="@{/tasks/{id}/delete(id=${t.id})}" method="post" style="display:inline;">
            <button type="submit">Delete</button>
        </form>

    </td>

</tr>

</tbody>

</table>

<hr>

<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

</body>
</html>
